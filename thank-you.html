<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You - Nexus Global</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header id="header-section">
      <nav id="navbar">
        <a class="logo" href="index.html">Nexus Global</a>
      </nav>
    </header>

    <main id="main-section">
      <section id="thank-you" style="text-align:center; padding:100px 20px;">
        <h1 style="background:var(--primary-color); padding:5px 10px; display:inline-block; font-weight:var(--font-bolder);">Thank You!</h1>
        <p style="margin-top:20px; font-size:1.1rem; color:var(--secondary-color);">
          Your message has been submitted successfully. We’ll get back to you within 24 hours.
        </p>
        <button onclick="location.href='index.html'" style="margin-top:30px; padding:12px 30px; font-weight:bold; border-radius:10px; border:2px solid var(--secondary-color); background:var(--primary-color); cursor:pointer;">
          Back to Home
        </button>
      </section>
    </main>

    <footer>
      <div class="footer-container">
        <div class="footer-brand">
          <h2>Nexus Global</h2>
          <p>Building modern websites with love.</p>
        </div>

        <div class="footer-info">
          <p>Email: nexusglobal.web@gmail.com</p>
          <p>Available: Mon - Sun (24/7)</p>
        </div>
      </div>

      <div class="footer-bottom">
        <p>© 2026 Nexus Global. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
